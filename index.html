<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>William Free Hall's Dashboard</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 2px solid #58a6ff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.4);
            text-align: center;
        }
        h1 { color: #58a6ff; margin-bottom: 10px; }
        .name { color: #ffffff; font-weight: bold; font-size: 1.5em; }
        code { background: #161b22; padding: 5px; border-radius: 5px; color: #ffa657; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Infrastructure Operational</h1>
        <p>Welcome, <span class="name">William Free Hall</span></p>
        <p>Your multi-tier stack is active.</p>
        <p>Database Status: <code>Connected & Pingable</code></p>
    </div>
</body>
</html>
