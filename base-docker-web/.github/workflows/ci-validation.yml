name: CI Code Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Validate Dockerfile Syntax
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
