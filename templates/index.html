<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>William's Dashboard</title>
</head>
<body>
    <div class="card">
        <h1>Welcome, William Free Hall</h1>
        <div class="counter">
            <p>Visitor Count</p>
            <h2>{{ count }}</h2>
        </div>
    </div>
</body>
</html>
<div class="log-section">
    <h3>Recent Visitors</h3>
    <ul>
        {% for log in logs %}
            <li>IP: {{ log[0] }} at {{ log[1].strftime('%H:%M:%S') }}</li>
        {% endfor %}
    </ul>
</div>
