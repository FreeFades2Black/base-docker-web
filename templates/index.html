<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Free Hall's Realm</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to William Free Hall's Realm</h1>
        
        <div class="counter-box">
            <div class="counter-title">Total Historical Hits</div>
            <div class="counter-number">{{ hits }}</div>
        </div>

        <h2>Project Source Code</h2>
        <div class="traffic-list" style="margin-bottom: 2rem;">
            <div class="traffic-row">
                <span class="guest-badge">GitHub Repository</span>
                <a href="https://github.com/FreeFades2Black/base-docker-web" target="_blank" class="referral-link">FreeFades2Black/base-docker-web</a>
            </div>
        </div>

        <h2>Real-Time Traffic Stream</h2>
        <div class="traffic-list">
            {% for log in traffic_logs %}
            <div class="traffic-row">
                <span class="guest-badge">Anonymous Guest</span>
                <span class="ip-address">({{ log.ip }}) came via</span>
                <span class="referral-link">{{ log.source }}</span>
                <span class="timestamp">at {{ log.timestamp }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
